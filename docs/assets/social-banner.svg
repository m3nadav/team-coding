<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06060f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0e0e24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#140e30;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="line-fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:0" />
      <stop offset="20%" style="stop-color:#7c3aed;stop-opacity:0.6" />
      <stop offset="50%" style="stop-color:#a78bfa;stop-opacity:1" />
      <stop offset="80%" style="stop-color:#7c3aed;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>
    <linearGradient id="terminal-border" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b3b5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1e3a;stop-opacity:1" />
    </linearGradient>
    <filter id="glow-sm">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feMerge><feMergeNode in="blur" /><feMergeNode in="SourceGraphic" /></feMerge>
    </filter>
    <filter id="glow-lg">
      <feGaussianBlur stdDeviation="30" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1280" height="640" fill="url(#bg)" />

  <!-- Ambient glow -->
  <ellipse cx="640" cy="280" rx="350" ry="200" fill="#7c3aed" opacity="0.035" filter="url(#glow-lg)" />

  <!-- Subtle noise texture via dots -->
  <g opacity="0.025" fill="#a78bfa">
    <circle cx="80" cy="80" r="1" /><circle cx="160" cy="80" r="1" /><circle cx="240" cy="80" r="1" /><circle cx="320" cy="80" r="1" /><circle cx="400" cy="80" r="1" /><circle cx="480" cy="80" r="1" /><circle cx="560" cy="80" r="1" /><circle cx="640" cy="80" r="1" /><circle cx="720" cy="80" r="1" /><circle cx="800" cy="80" r="1" /><circle cx="880" cy="80" r="1" /><circle cx="960" cy="80" r="1" /><circle cx="1040" cy="80" r="1" /><circle cx="1120" cy="80" r="1" /><circle cx="1200" cy="80" r="1" />
    <circle cx="80" cy="160" r="1" /><circle cx="160" cy="160" r="1" /><circle cx="240" cy="160" r="1" /><circle cx="320" cy="160" r="1" /><circle cx="400" cy="160" r="1" /><circle cx="480" cy="160" r="1" /><circle cx="560" cy="160" r="1" /><circle cx="640" cy="160" r="1" /><circle cx="720" cy="160" r="1" /><circle cx="800" cy="160" r="1" /><circle cx="880" cy="160" r="1" /><circle cx="960" cy="160" r="1" /><circle cx="1040" cy="160" r="1" /><circle cx="1120" cy="160" r="1" /><circle cx="1200" cy="160" r="1" />
    <circle cx="80" cy="480" r="1" /><circle cx="160" cy="480" r="1" /><circle cx="240" cy="480" r="1" /><circle cx="320" cy="480" r="1" /><circle cx="400" cy="480" r="1" /><circle cx="480" cy="480" r="1" /><circle cx="560" cy="480" r="1" /><circle cx="640" cy="480" r="1" /><circle cx="720" cy="480" r="1" /><circle cx="800" cy="480" r="1" /><circle cx="880" cy="480" r="1" /><circle cx="960" cy="480" r="1" /><circle cx="1040" cy="480" r="1" /><circle cx="1120" cy="480" r="1" /><circle cx="1200" cy="480" r="1" />
    <circle cx="80" cy="560" r="1" /><circle cx="160" cy="560" r="1" /><circle cx="240" cy="560" r="1" /><circle cx="320" cy="560" r="1" /><circle cx="400" cy="560" r="1" /><circle cx="480" cy="560" r="1" /><circle cx="560" cy="560" r="1" /><circle cx="640" cy="560" r="1" /><circle cx="720" cy="560" r="1" /><circle cx="800" cy="560" r="1" /><circle cx="880" cy="560" r="1" /><circle cx="960" cy="560" r="1" /><circle cx="1040" cy="560" r="1" /><circle cx="1120" cy="560" r="1" /><circle cx="1200" cy="560" r="1" />
  </g>

  <!-- Main title — monospace for that dev/hacker feel -->
  <text x="640" y="235" font-family="'SF Mono', 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Menlo, monospace" font-size="90" font-weight="700" fill="#ffffff" text-anchor="middle" letter-spacing="-4">claude-duet</text>

  <!-- Glowing underline under title -->
  <rect x="390" y="252" width="500" height="2" rx="1" fill="url(#accent)" opacity="0.5" />
  <rect x="440" y="252" width="400" height="2" rx="1" fill="#a78bfa" opacity="0.15" filter="url(#glow-sm)" />

  <!-- Tagline — casual, clean -->
  <text x="640" y="305" font-family="'Inter', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="30" fill="#c4b5fd" text-anchor="middle" font-weight="400" letter-spacing="0.5">two devs, one claude</text>

  <!-- Description -->
  <text x="640" y="355" font-family="'Inter', 'SF Pro Display', 'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" fill="#555577" text-anchor="middle" letter-spacing="1">REAL-TIME SHARED AI SESSIONS  ·  PEER-TO-PEER  ·  E2E ENCRYPTED  ·  OPEN SOURCE</text>

  <!-- Pill badges row -->
  <g transform="translate(372, 385)">
    <rect x="0" y="0" width="100" height="30" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
    <text x="50" y="20" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">p2p</text>
  </g>
  <g transform="translate(486, 385)">
    <rect x="0" y="0" width="105" height="30" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
    <text x="52" y="20" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">typescript</text>
  </g>
  <g transform="translate(605, 385)">
    <rect x="0" y="0" width="120" height="30" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
    <text x="60" y="20" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">claude code</text>
  </g>
  <g transform="translate(739, 385)">
    <rect x="0" y="0" width="90" height="30" rx="6" fill="none" stroke="#7c3aed" stroke-width="1" stroke-opacity="0.4" />
    <text x="45" y="20" font-family="'SF Mono', Menlo, monospace" font-size="11" fill="#a78bfa" text-anchor="middle">encrypted</text>
  </g>

  <!-- Left terminal (Host) -->
  <g transform="translate(310, 465)">
    <rect x="0" y="0" width="190" height="115" rx="10" fill="#0d0d1f" stroke="url(#terminal-border)" stroke-width="1.5" />
    <rect x="1" y="1" width="188" height="26" rx="10" fill="#161630" />
    <circle cx="14" cy="14" r="4.5" fill="#ff5f57" opacity="0.7" />
    <circle cx="28" cy="14" r="4.5" fill="#febc2e" opacity="0.7" />
    <circle cx="42" cy="14" r="4.5" fill="#28c840" opacity="0.7" />
    <text x="95" y="18" font-family="'SF Mono', Menlo, monospace" font-size="9" fill="#444466" text-anchor="middle">~/ claude-duet</text>
    <!-- Terminal content -->
    <text x="10" y="46" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#28c840" opacity="0.8">$</text>
    <text x="22" y="46" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#8888aa" opacity="0.7">npx claude-duet host</text>
    <text x="10" y="62" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#7c3aed" opacity="0.7">&#10022;</text>
    <text x="22" y="62" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#666688" opacity="0.6">session started</text>
    <text x="10" y="78" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#666688" opacity="0.4">waiting for partner...</text>
    <!-- Label -->
    <text x="95" y="106" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#555577" text-anchor="middle" letter-spacing="3">HOST</text>
  </g>

  <!-- Right terminal (Guest) -->
  <g transform="translate(780, 465)">
    <rect x="0" y="0" width="190" height="115" rx="10" fill="#0d0d1f" stroke="url(#terminal-border)" stroke-width="1.5" />
    <rect x="1" y="1" width="188" height="26" rx="10" fill="#161630" />
    <circle cx="14" cy="14" r="4.5" fill="#ff5f57" opacity="0.7" />
    <circle cx="28" cy="14" r="4.5" fill="#febc2e" opacity="0.7" />
    <circle cx="42" cy="14" r="4.5" fill="#28c840" opacity="0.7" />
    <text x="95" y="18" font-family="'SF Mono', Menlo, monospace" font-size="9" fill="#444466" text-anchor="middle">~/ project</text>
    <!-- Terminal content -->
    <text x="10" y="46" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#28c840" opacity="0.8">$</text>
    <text x="22" y="46" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#8888aa" opacity="0.7">npx claude-duet join</text>
    <text x="10" y="62" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#7c3aed" opacity="0.7">&#10022;</text>
    <text x="22" y="62" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#666688" opacity="0.6">connected!</text>
    <text x="10" y="78" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#a78bfa" opacity="0.4">fix the auth bug</text>
    <!-- Label -->
    <text x="95" y="106" font-family="'SF Mono', Menlo, monospace" font-size="10" fill="#555577" text-anchor="middle" letter-spacing="3">GUEST</text>
  </g>

  <!-- Connection: dashed line with glow -->
  <line x1="500" y1="522" x2="780" y2="522" stroke="url(#line-fade)" stroke-width="1.5" stroke-dasharray="8,5" />

  <!-- Center star on connection -->
  <text x="640" y="532" font-family="system-ui, sans-serif" font-size="32" fill="#a78bfa" text-anchor="middle" filter="url(#glow-sm)">&#10022;</text>
</svg>
